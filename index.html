<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Singapore Cartography</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --cream:#fafff2;--surface:#f4efe4;--surf2:#ece5d6;--border:#e1d9c8;
      --ink:#0a0a0a;--ink-mid:#2a2a2a;--ink-dim:#6a6560;--ink-ghost:#a09890;
      --font:Helvetica Neue,Helvetica,Arial,sans-serif;
      --radius:14px;--shadow:5px 5px 0 rgba(0,0,0,0.70);
      --status-h:26px;--t:0.18s ease;
    }
    html,body{width:100%;height:100%;overflow:hidden;background:var(--surface);font-family:var(--font);font-size:13px;-webkit-font-smoothing:antialiased}
    #map{position:fixed;top:0;left:0;right:0;bottom:var(--status-h);z-index:1}
    .leaflet-control-attribution{display:none!important}
    .leaflet-bar{border:2px solid var(--ink)!important;border-radius:10px!important;overflow:hidden;box-shadow:3px 3px 0 rgba(0,0,0,0.55)!important}
    .leaflet-bar a{background:var(--cream)!important;color:var(--ink)!important;border-color:var(--border)!important;font-weight:700!important}
    .leaflet-bar a:hover{background:var(--surf2)!important}

    /* ── SIDEBAR ── */
    #sidebar{position:fixed;top:16px;left:16px;bottom:calc(var(--status-h)+16px);width:264px;z-index:400;background:var(--cream);border:2.5px solid var(--ink);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden}
    #sidebar-header{padding:14px 15px 12px;flex-shrink:0;position:relative;overflow:hidden}
    #sidebar-header::before{content:'';position:absolute;inset:0;background:#E8A021;background-image:repeating-linear-gradient(-45deg,rgba(0,0,0,0.13) 0,rgba(0,0,0,0.13) 1px,transparent 1px,transparent 7px);z-index:0}
    #sidebar-header>*{position:relative;z-index:1}
    .logo{font-size:22px;font-weight:800;letter-spacing:-0.05em;color:#0a0a0a;line-height:1.0}
    .tagline{font-size:9px;color:rgba(0,0,0,0.5);letter-spacing:0.16em;text-transform:uppercase;font-weight:700;margin-top:5px}

    /* Label toggle button in sidebar header */
    #label-toggle{display:flex;align-items:center;gap:5px;margin-top:9px;padding:5px 9px;background:rgba(0,0,0,0.12);border:1.5px solid rgba(0,0,0,0.18);border-radius:7px;cursor:pointer;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#0a0a0a;transition:background 0.15s;width:fit-content}
    #label-toggle:hover{background:rgba(0,0,0,0.2)}
    #label-toggle .lt-dot{width:8px;height:8px;border-radius:50%;background:#0a0a0a;flex-shrink:0;transition:background 0.15s}
    #label-toggle.off .lt-dot{background:rgba(0,0,0,0.3)}
    #label-toggle.off{opacity:0.65}

    #road-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    #road-list::-webkit-scrollbar{width:3px}
    #road-list::-webkit-scrollbar-thumb{background:var(--border)}

    .road-category{border-bottom:1.5px solid var(--border)}
    .cat-header{display:flex;align-items:center;justify-content:space-between;padding:0 13px;height:32px;cursor:pointer;user-select:none;border-left:4px solid transparent;transition:background var(--t)}
    .cat-header:hover{background:var(--surf2)}
    .cat-header.exp{border-left-color:#7a1535}
    .cat-header.maj{border-left-color:#0a5c4a}
    .cat-header.min{border-left-color:#8832c8}
    .cat-label{font-size:8.5px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-dim)}
    .cat-right{display:flex;align-items:center;gap:5px}
    .cat-count{font-size:8.5px;color:var(--ink-ghost)}
    .cat-chev{font-size:9px;color:var(--ink-ghost);transition:transform var(--t)}
    .cat-chev.open{transform:rotate(180deg)}
    .cat-body{overflow:hidden}

    .road-item{display:flex;align-items:center;padding:0 10px 0 13px;height:38px;cursor:pointer;gap:8px;border-left:4px solid transparent;border-bottom:1px solid var(--border);transition:background var(--t)}
    .road-item:last-child{border-bottom:none}
    .road-item:hover{background:var(--surf2)}
    .road-item.active{background:rgba(0,0,0,0.04)}
    .road-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,0.12);transition:transform var(--t)}
    .road-item.active .road-dot{transform:scale(1.3)}
    .road-badge{font-size:8px;font-weight:700;letter-spacing:0.04em;padding:2px 5px;border-radius:4px;flex-shrink:0;min-width:32px;text-align:center;color:#fff}
    .road-name{font-size:10.5px;font-weight:600;color:var(--ink-mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .road-item.active .road-name{color:var(--ink);font-weight:700}
    .road-km{font-size:8.5px;color:var(--ink-ghost);flex-shrink:0}
    .road-check{flex-shrink:0;width:14px;height:14px;border:1.5px solid var(--border);border-radius:3px;background:var(--surf2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--t)}
    .road-check.checked{background:var(--ink);border-color:var(--ink)}
    .road-check.checked::after{content:'✓';font-size:9px;color:#fff;font-weight:800;line-height:1}
    .cat-empty{padding:9px 13px;font-size:9px;color:var(--ink-ghost);text-transform:uppercase;letter-spacing:0.1em;font-weight:600}

    /* ── INFO CARD ── */
    #info-card{position:fixed;top:16px;right:16px;bottom:calc(var(--status-h)+16px);width:308px;z-index:400;background:var(--cream);border:2.5px solid var(--ink);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden}
    #card-stripe{height:7px;background:var(--border);flex-shrink:0;transition:background 0.3s}
    #card-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:28px;text-align:center}
    .empty-hatch{width:72px;height:72px;background-image:repeating-linear-gradient(-45deg,var(--border) 0,var(--border) 1px,transparent 1px,transparent 7px);border:1.5px solid var(--border);border-radius:10px;opacity:0.7}
    #card-empty p{font-size:10px;font-weight:600;color:var(--ink-ghost);letter-spacing:0.07em;line-height:1.8}
    #card-content{display:none;flex-direction:column;height:100%;overflow:hidden}
    #card-header{padding:13px 15px 12px;border-bottom:1.5px solid var(--border);flex-shrink:0}
    #card-ref{font-size:8.5px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-ghost);margin-bottom:2px}
    #card-name{font-size:26px;font-weight:800;color:var(--ink);letter-spacing:-0.03em;line-height:1;margin-bottom:12px}
    #card-meta{display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
    .meta-cell{flex:1;padding:6px 8px;border-right:1.5px solid var(--border);display:flex;flex-direction:column;gap:1px}
    .meta-cell:last-child{border-right:none}
    .meta-lbl{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.13em;color:var(--ink-ghost)}
    .meta-val{font-size:13px;font-weight:800;color:var(--ink);letter-spacing:-0.02em}

    #card-body{flex:1;overflow-y:auto;padding:13px 15px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    #card-body::-webkit-scrollbar{width:3px}
    #card-body::-webkit-scrollbar-thumb{background:var(--border)}
    .sec-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.2em;color:var(--ink-ghost);margin-bottom:9px}
    #card-facts{display:flex;flex-direction:column;gap:7px;margin-bottom:20px}
    .fact{padding:9px 11px;background:var(--surf2);border-radius:7px;border-left:4px solid var(--border);font-size:11px;font-weight:500;line-height:1.65;color:var(--ink-mid)}

    #connections-section{margin-bottom:6px}
    .conn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:0}
    .conn-col-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:var(--ink-ghost);margin-bottom:7px}
    .conn-col{display:flex;flex-direction:column;gap:5px}
    .conn-bubble-exp{display:inline-flex;align-items:center;justify-content:center;padding:4px 9px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:-0.01em;border:1.5px solid rgba(0,0,0,0.15);cursor:default;white-space:nowrap}
    .conn-bubble-area{display:inline-flex;align-items:center;padding:4px 9px;border-radius:20px;font-size:9.5px;font-weight:600;letter-spacing:-0.01em;background:var(--surf2);color:var(--ink-mid);border:1.5px solid var(--border);white-space:nowrap;overflow:hidden}

    #card-footer{padding:10px 15px 13px;border-top:1.5px solid var(--border);display:flex;flex-direction:column;gap:7px;flex-shrink:0}
    .btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 14px;border:2px solid var(--ink);border-radius:8px;background:var(--surf2);color:var(--ink);font-family:var(--font);font-size:10px;font-weight:700;letter-spacing:0.05em;cursor:pointer;transition:all var(--t);width:100%}
    .btn:hover{background:var(--ink);color:var(--cream)}
    .btn.primary{color:#fff;border-color:transparent}
    .btn.primary:hover{filter:brightness(0.82)}
    .btn.copied{background:#0a5c4a!important;color:#fff!important;border-color:#0a5c4a!important}

    /* ── STATUS ── */
    #status-bar{position:fixed;bottom:0;left:0;right:0;height:var(--status-h);background:var(--ink);display:flex;align-items:center;padding:0 14px;z-index:500;gap:8px}
    #status-dot{width:6px;height:6px;border-radius:50%;background:#444;flex-shrink:0;transition:background 0.3s}
    #status-dot.loading{background:#e8a020;animation:pulse 1s infinite}
    #status-dot.error{background:#d63c2f}
    #status-dot.ok{background:#0a5c4a}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
    #status-text{font-size:9px;font-weight:600;letter-spacing:0.1em;color:#777;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    #status-coords{margin-left:auto;font-size:9px;color:#555;flex-shrink:0}

    /* ── HAMBURGER ── */
    #hamburger{display:none;position:fixed;top:14px;left:14px;z-index:600;background:var(--ink);border:none;border-radius:10px;width:40px;height:40px;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;box-shadow:3px 3px 0 rgba(0,0,0,0.55)}
    #hamburger span{display:block;width:18px;height:2px;background:var(--cream);border-radius:1px;transition:transform var(--t),opacity var(--t)}
    #hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    #hamburger.open span:nth-child(2){opacity:0}
    #hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
    #overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:350}

    /* ── MOBILE DRAWER ── */
    #mob-drawer{display:none;position:fixed;left:12px;right:12px;bottom:calc(var(--status-h)+10px);background:var(--cream);border:2.5px solid var(--ink);border-radius:var(--radius);box-shadow:var(--shadow);z-index:450;transform:translateY(110%);transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);max-height:64vh;overflow-y:auto}
    #mob-drawer.open{transform:translateY(0)}
    #mob-handle{width:30px;height:3px;background:var(--border);border-radius:2px;margin:9px auto 5px;cursor:pointer}
    #mob-inner{padding:0 15px 18px}

    /* ── MAP CALLOUT LABELS ── */
    .area-label{display:inline-block;background:#fff;border:1.5px solid #0a0a0a;border-radius:5px;padding:2px 6px;font-family:Helvetica Neue,Helvetica,Arial,sans-serif;font-size:9px;font-weight:700;letter-spacing:-0.02em;color:#0a0a0a;white-space:nowrap;pointer-events:none;box-shadow:1.5px 1.5px 0 rgba(0,0,0,0.60);line-height:1.3}
    .area-label.active-area{background:#E8A021;border-color:#0a0a0a;color:#0a0a0a}

    .road-callout-wrap{display:inline-block;white-space:nowrap;pointer-events:none}
    .road-callout-inner{display:inline-block;padding:4px 10px;border-radius:6px;border:2px solid rgba(0,0,0,0.3);font-family:Helvetica Neue,Helvetica,Arial,sans-serif;font-size:12px;font-weight:800;letter-spacing:-0.01em;white-space:nowrap;box-shadow:2.5px 2.5px 0 rgba(0,0,0,0.60)}

    /* ── RESPONSIVE ── */
    @media(max-width:980px){#info-card{display:none}#mob-drawer{display:block}}
    @media(max-width:700px){
      #sidebar{transform:translateX(calc(-100% - 20px));transition:transform var(--t)}
      #sidebar.open{transform:translateX(0)}
      #overlay{display:block;opacity:0;pointer-events:none;transition:opacity var(--t)}
      #overlay.active{opacity:1;pointer-events:all}
      #hamburger{display:flex}
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <button id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  <div id="overlay"></div>

  <nav id="sidebar">
    <div id="sidebar-header">
      <div class="logo">Singapore<br>Cartography</div>
      <div class="tagline">Road atlas</div>
      <button id="label-toggle" class="off">
        <span class="lt-dot"></span>
        <span id="lt-text">Labels off</span>
      </button>
    </div>
    <div id="road-list"></div>
  </nav>

  <aside id="info-card">
    <div id="card-stripe"></div>
    <div id="card-empty">
      <div class="empty-hatch"></div>
      <p>Select a road to view facts and connections</p>
    </div>
    <div id="card-content">
      <div id="card-header">
        <div id="card-ref"></div>
        <div id="card-name"></div>
        <div id="card-meta">
          <div class="meta-cell"><span class="meta-lbl">Length</span><span class="meta-val" id="meta-length">—</span></div>
          <div class="meta-cell"><span class="meta-lbl">Opened</span><span class="meta-val" id="meta-opened">—</span></div>
          <div class="meta-cell"><span class="meta-lbl">Type</span><span class="meta-val" id="meta-cat">—</span></div>
        </div>
      </div>
      <div id="card-body">
        <div class="sec-lbl">Road facts</div>
        <div id="card-facts"></div>
        <div id="connections-section">
          <div class="conn-grid">
            <div>
              <div class="conn-col-label">Connected expressways</div>
              <div class="conn-col" id="conn-exp"></div>
            </div>
            <div>
              <div class="conn-col-label">Regions</div>
              <div class="conn-col" id="conn-area"></div>
            </div>
          </div>
        </div>
      </div>
      <div id="card-footer">
        <button class="btn primary" id="btn-copy">⊕ Copy caption</button>
        <button class="btn" id="btn-export">↓ Export map image</button>
      </div>
    </div>
  </aside>

  <div id="mob-drawer"><div id="mob-handle"></div><div id="mob-inner"></div></div>
  <div id="status-bar"><div id="status-dot"></div><div id="status-text">Loading…</div><div id="status-coords"></div></div>

  expressways:[
    {id:"aye",name:"Ayer Rajah Expressway",        short:"AYE",color:"#d63c2f",length_km:40,opened:1988,facts:["The Ayer Rajah Expressway (AYE) stretches approximately 40km across Singapore's southern corridor, connecting Jurong in the west to the city centre.","It passes through some of Singapore's most significant industrial and educational zones, including the National University of Singapore and one-north.","The AYE was progressively built in stages from 1988, making it one of Singapore's longer expressway construction projects."],hashtags:"#AYE #AyerRajahExpressway #Singapore #SingaporeRoads"},
    {id:"bke",name:"Bukit Timah Expressway",       short:"BKE",color:"#e8a020",length_km:11,opened:1986,facts:["The Bukit Timah Expressway (BKE) is one of Singapore's shorter expressways at approximately 11km, running north from the PIE junction toward Woodlands.","It passes alongside the Bukit Timah Nature Reserve, one of the last remaining primary rainforest patches in Singapore.","Opened in 1986, the BKE provides a key corridor linking the central region to the causeway and Johor Bahru."],hashtags:"#BKE #BukitTimahExpressway #Singapore #SingaporeRoads"},
    {id:"cte",name:"Central Expressway",           short:"CTE",color:"#0a5c4a",length_km:17,opened:1991,facts:["The Central Expressway (CTE) is Singapore's primary north-south spine, running approximately 17km from Toa Payoh through the city centre.","It includes Singapore's longest road tunnel, passing beneath the Bukit Timah area and the Singapore River district.","The CTE is one of Singapore's most congested expressways during peak hours, particularly at its city-bound tunnels."],hashtags:"#CTE #CentralExpressway #Singapore #SingaporeRoads"},
    {id:"ecp",name:"East Coast Parkway",           short:"ECP",color:"#1e4d8c",length_km:19,opened:1981,facts:["The East Coast Parkway (ECP) was Singapore's first expressway, opened in 1981 and running approximately 19km along the southern coastline.","Much of the land beneath the ECP is reclaimed — the shoreline here did not exist before the 1970s land reclamation programme.","The ECP connects the CBD to Changi Airport and passes alongside East Coast Park, one of Singapore's most popular recreational corridors."],hashtags:"#ECP #EastCoastParkway #Singapore #SingaporeRoads"},
    {id:"kje",name:"Kranji Expressway",            short:"KJE",color:"#8832c8",length_km:9, opened:1994,facts:["The Kranji Expressway (KJE) is Singapore's shortest expressway at approximately 9km, connecting Choa Chu Kang to Woodlands and the BKE.","It passes through the northwestern corridor of Singapore, serving new towns like Bukit Panjang and Choa Chu Kang.","Opened in 1994, the KJE was built to support rapid population growth in Singapore's western new towns during the 1990s."],hashtags:"#KJE #KranjiExpressway #Singapore #SingaporeRoads"},
    {id:"kpe",name:"Kallang-Paya Lebar Expressway",short:"KPE",color:"#d4541a",length_km:12,opened:2008,facts:["The Kallang-Paya Lebar Expressway (KPE) opened in 2008 and includes the world's longest underground expressway tunnel at the time of its completion.","At approximately 12km in total, around 9km of the KPE runs underground, making it a significant feat of tunnelling engineering.","The KPE connects the eastern regions of Singapore to the city, providing relief to the heavily trafficked ECP and CTE corridors."],hashtags:"#KPE #KallangPayaLebarExpressway #Singapore #SingaporeRoads"},
    {id:"mce",name:"Marina Coastal Expressway",    short:"MCE",color:"#c8328a",length_km:5, opened:2013,facts:["The Marina Coastal Expressway (MCE) is Singapore's newest and shortest expressway, opened in 2013 at approximately 5km in length.","It runs almost entirely underground, connecting the ECP to the AYE beneath the Marina Bay reclaimed land area.","The MCE completed Singapore's expressway ring road system, closing the final gap in the city's highway network."],hashtags:"#MCE #MarinaCoastalExpressway #Singapore #SingaporeRoads"},
    {id:"pie",name:"Pan Island Expressway",        short:"PIE",color:"#7a1535",length_km:42,opened:1966,facts:["The Pan Island Expressway (PIE) is Singapore's longest expressway at approximately 42km, stretching from Tuas in the west to Changi Airport in the east.","Construction began in 1966, making it one of the earliest expressways built as Singapore rapidly developed its road infrastructure.","The PIE connects virtually every other expressway in Singapore, making it the backbone of the island's highway network."],hashtags:"#PIE #PanIslandExpressway #Singapore #SingaporeRoads"},
    {id:"sle",name:"Seletar Expressway",           short:"SLE",color:"#2a7c6f",length_km:13,opened:1994,facts:["The Seletar Expressway (SLE) runs approximately 13km through Singapore's north, connecting Woodlands to the TPE and the northeastern regions.","It passes close to Seletar Airport, Singapore's general aviation airport and one of the oldest airfields in Southeast Asia.","The SLE opened in 1994 and forms a key part of the northern expressway loop alongside the BKE and TPE."],hashtags:"#SLE #SeletarExpressway #Singapore #SingaporeRoads"},
    {id:"tpe",name:"Tampines Expressway",          short:"TPE",color:"#4a7a1e",length_km:15,opened:1991,facts:["The Tampines Expressway (TPE) stretches approximately 15km through Singapore's northeastern corridor, connecting the SLE to Changi.","It serves the large residential towns of Sengkang, Punggol, and Tampines, some of Singapore's most densely populated new towns.","The TPE opened in 1991 and has become a critical artery as the northeastern region of Singapore has grown significantly in population."],hashtags:"#TPE #TampinesExpressway #Singapore #SingaporeRoads"}

function textColor(hex){
  var h=hex.replace('#','');
  var r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
  return (0.299*r+0.587*g+0.114*b)/255<0.5?'#ffffff':'#0a0a0a';
}

// ── INIT ──
document.addEventListener('DOMContentLoaded',function(){ setTimeout(initApp,50); });

function initApp(){
  map=L.map('map',{center:[1.3521,103.8198],zoom:11,zoomControl:false,attributionControl:false});
  L.control.zoom({position:'bottomright'}).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(map);
  map.on('mousemove',function(e){
    document.getElementById('status-coords').textContent=e.latlng.lat.toFixed(4)+', '+e.latlng.lng.toFixed(4);
  });

  // Planning area boundaries — subtle dotted base layer
  L.geoJSON(SG_BOUNDARIES,{
    style:{color:'#b0a898',weight:1,opacity:0.4,fill:false,dashArray:'5 4'}
  }).addTo(map);

  // Build area marker map for quick DOM lookup
  SG_CENTROIDS.forEach(function(c){
    var m=L.marker([c.lat,c.lng],{
      icon:L.divIcon({
        className:'area-label',
        html:c.n,
        iconSize:null,
        iconAnchor:null
      }),
      interactive:false,
      zIndexOffset:50
    });
    areaMarkers.push(m);
    areaMarkerMap[c.n]=m;
    // Start hidden
  });

  buildSidebar();
  document.getElementById('btn-copy').addEventListener('click',copyCaption);
  document.getElementById('btn-export').addEventListener('click',exportMap);
  document.getElementById('hamburger').addEventListener('click',toggleSidebar);
  document.getElementById('overlay').addEventListener('click',closeSidebar);
  document.getElementById('mob-handle').addEventListener('click',function(){ document.getElementById('mob-drawer').classList.toggle('open'); });
  document.getElementById('label-toggle').addEventListener('click',toggleLabels);
  setStatus('ok','Ready — select a road from the list.');
}

// ── LABEL TOGGLE ──
function toggleLabels(){
  labelsVisible=!labelsVisible;
  var btn=document.getElementById('label-toggle');
  btn.classList.toggle('off',!labelsVisible);
  document.getElementById('lt-text').textContent=labelsVisible?'Labels on':'Labels off';

  if(labelsVisible){
    // show all area markers + active road callouts
    areaMarkers.forEach(function(m){ m.addTo(map); });
    Object.keys(roadState).forEach(function(id){
      var s=roadState[id];
      if(s.visible) s.callout.addTo(map);
    });
  } else {
    areaMarkers.forEach(function(m){ map.removeLayer(m); });
    Object.keys(roadState).forEach(function(id){
      map.removeLayer(roadState[id].callout);
    });
  }
}

// ── AREA HIGHLIGHT for active road ──
function highlightAreas(road){
  // Remove previous highlights
  areaLayers.forEach(function(l){ map.removeLayer(l); }); areaLayers=[];
  // Reset all label colours
  areaMarkers.forEach(function(m){ m.getElement()&&m.getElement().classList.remove('active-area'); });

  if(!road) return;
  var activeAreas=AREA_MAP[road.short]||[];
  var activeSet={};
  activeAreas.forEach(function(a){ activeSet[a]=true; });

  // Add thick boundary outlines for active areas
  SG_BOUNDARIES.features.forEach(function(f){
    var name=f.properties.n;
    if(!activeSet[name]) return;
    var hl=L.geoJSON(f,{
      style:{color:'#E8A021',weight:3.5,opacity:0.9,fill:true,fillColor:'#E8A021',fillOpacity:0.08,dashArray:null}
    }).addTo(map);
    areaLayers.push(hl);
  });

  // Colour active area labels
  if(labelsVisible){
    activeAreas.forEach(function(name){
      var m=areaMarkerMap[name];
      if(m&&m.getElement()) m.getElement().classList.add('active-area');
    });
  }
}

// ── SIDEBAR ──
function buildSidebar(){
  var list=document.getElementById('road-list');
  list.innerHTML='';
  var cats=[
    {key:'expressways',label:'Expressways',cls:'exp'},
    {key:'major_roads',label:'Major roads',cls:'maj'},
    {key:'minor_roads',label:'Minor roads',cls:'min'}
  ];
  cats.forEach(function(cat){
    var roads=(ROADS[cat.key]||[]);
    var wrap=document.createElement('div'); wrap.className='road-category';
    var hdr=document.createElement('div'); hdr.className='cat-header '+cat.cls;
    hdr.innerHTML='<span class="cat-label">'+cat.label+'</span><span class="cat-right"><span class="cat-count">'+roads.length+'</span><span class="cat-chev open">▾</span></span>';
    var body=document.createElement('div'); body.className='cat-body';
    if(!roads.length){
      body.innerHTML='<div class="cat-empty">Coming soon</div>';
    } else {
      roads.forEach(function(road){
        buildRoadLayer(road);
        var item=document.createElement('div'); item.className='road-item';
        // starts unchecked
        item.innerHTML='<span class="road-dot" style="background:'+road.color+'"></span><span class="road-badge" style="background:'+road.color+'">'+road.short+'</span><span class="road-name">'+road.name+'</span><span class="road-km">'+road.length_km+'km</span><span class="road-check" data-id="'+road.id+'"></span>';
        item.addEventListener('click',function(e){ if(e.target.classList.contains('road-check'))return; selectRoad(road,item); });
        item.querySelector('.road-check').addEventListener('click',function(e){ e.stopPropagation(); toggleVis(road,this); });
        body.appendChild(item);
      });
    }
    var open=true;
    hdr.addEventListener('click',function(){
      open=!open;
      hdr.querySelector('.cat-chev').classList.toggle('open',open);
      body.style.maxHeight=open?(body.scrollHeight+200)+'px':'0';
    });
    body.style.maxHeight='9999px';
    wrap.appendChild(hdr); wrap.appendChild(body);
    list.appendChild(wrap);
  });
}

function buildRoadLayer(road){
  var segs=EXP_DATA[road.short];
  if(!segs||!segs.length) return;
  var features=segs.map(function(seg){ return {type:'Feature',geometry:{type:'LineString',coordinates:seg},properties:{}}; });
  var layer=L.geoJSON({type:'FeatureCollection',features:features},{
    style:{color:road.color,weight:4.5,opacity:0.92,lineCap:'round',lineJoin:'round'}
  });

  var allLat=[],allLng=[];
  segs.forEach(function(seg){ seg.forEach(function(c){ allLng.push(c[0]); allLat.push(c[1]); }); });
  var clat=(Math.min.apply(null,allLat)+Math.max.apply(null,allLat))/2;
  var clng=(Math.min.apply(null,allLng)+Math.max.apply(null,allLng))/2;
  var tc=textColor(road.color);
  var callout=L.marker([clat,clng],{
    icon:L.divIcon({
      className:'road-callout-wrap',
      html:'<span class="road-callout-inner" style="background:'+road.color+';color:'+tc+'">'+road.short+'</span>',
      iconSize:null,
      iconAnchor:null
    }),
    interactive:false,
    zIndexOffset:500
  });

  // Start: layer hidden, callout hidden
  roadState[road.id]={layer:layer,callout:callout,visible:false,road:road};
  // Don't add to map yet
}

function toggleVis(road,chkEl){
  var s=roadState[road.id]; if(!s) return;
  s.visible=!s.visible;
  chkEl.classList.toggle('checked',s.visible);
  if(s.visible){
    s.layer.addTo(map);
    if(labelsVisible) s.callout.addTo(map);
  } else {
    map.removeLayer(s.layer);
    map.removeLayer(s.callout);
  }
}

function selectRoad(road,itemEl){
  if(activeItem) activeItem.classList.remove('active');
  itemEl.classList.add('active');
  activeItem=itemEl; activeRoad=road;
  if(window.innerWidth<=700) closeSidebar();
  var s=roadState[road.id];
  if(s){
    // Auto-enable road when selected
    if(!s.visible){
      s.visible=true;
      var chk=document.querySelector('[data-id="'+road.id+'"]');
      if(chk) chk.classList.add('checked');
      s.layer.addTo(map);
      if(labelsVisible) s.callout.addTo(map);
    }
    var b=s.layer.getBounds();
    if(b.isValid()) map.fitBounds(b,{padding:[60,60],maxZoom:15,animate:true});
  }
  highlightAreas(road);
  showCard(road);
}

function showCard(road){
  document.getElementById('card-stripe').style.background=road.color;
  document.getElementById('card-ref').textContent=road.short;
  document.getElementById('card-name').textContent=road.name;
  document.getElementById('meta-length').textContent=road.length_km+' km';
  document.getElementById('meta-opened').textContent=road.opened||'—';
  document.getElementById('meta-cat').textContent='Expressway';

  var factsEl=document.getElementById('card-facts');
  factsEl.innerHTML='';
  (road.facts||[]).forEach(function(f){
    var d=document.createElement('div'); d.className='fact';
    d.style.borderLeftColor=road.color; d.textContent=f;
    factsEl.appendChild(d);
  });

  var connEl=document.getElementById('conn-exp');
  connEl.innerHTML='';
  (CONNECTIONS[road.short]||[]).forEach(function(s){
    var col=EXP_COLOR[s]||'#888';
    var tc=textColor(col);
    var b=document.createElement('span');
    b.className='conn-bubble-exp';
    b.style.background=col; b.style.color=tc;
    b.textContent=s;
    connEl.appendChild(b);
  });

  var areaEl=document.getElementById('conn-area');
  areaEl.innerHTML='';
  (AREA_MAP[road.short]||[]).forEach(function(a){
    var b=document.createElement('span');
    b.className='conn-bubble-area';
    b.textContent=a;
    areaEl.appendChild(b);
  });

  var btn=document.getElementById('btn-copy');
  btn.style.background=road.color; btn.style.borderColor=road.color;
  document.getElementById('card-empty').style.display='none';
  document.getElementById('card-content').style.display='flex';

  // Mobile
  var mobInner=document.getElementById('mob-inner');
  var connHtml=(CONNECTIONS[road.short]||[]).map(function(s){
    var col=EXP_COLOR[s]||'#888';
    var tc=textColor(col);
    return '<span style="display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;background:'+col+';color:'+tc+';font-size:10px;font-weight:800;margin:0 4px 4px 0;border:1.5px solid rgba(0,0,0,0.15)">'+s+'</span>';
  }).join('');
  var areaHtml=(AREA_MAP[road.short]||[]).map(function(a){
    return '<span style="display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;background:var(--surf2);color:var(--ink-mid);font-size:9px;font-weight:600;margin:0 4px 4px 0;border:1.5px solid var(--border)">'+a+'</span>';
  }).join('');
  mobInner.innerHTML=
    '<div style="height:6px;background:'+road.color+';margin:0 -15px 12px"></div>'+
    '<div style="font-size:8.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-ghost);margin-bottom:2px">'+road.short+' · Expressway</div>'+
    '<div style="font-size:24px;font-weight:800;letter-spacing:-.03em;color:var(--ink);margin-bottom:12px;line-height:1">'+road.name+'</div>'+
    (road.facts||[]).map(function(f){return '<div style="font-size:11px;line-height:1.65;color:var(--ink-mid);border-left:4px solid '+road.color+';padding:7px 10px;margin-bottom:7px;background:var(--surf2);border-radius:0 6px 6px 0">'+f+'</div>';}).join('')+
    '<div style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:var(--ink-ghost);margin:14px 0 6px">Connected</div>'+
    '<div style="margin-bottom:12px">'+connHtml+'</div>'+
    '<div style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:var(--ink-ghost);margin-bottom:6px">Regions</div>'+
    '<div>'+areaHtml+'</div>';
  document.getElementById('mob-drawer').classList.add('open');
}

function buildCaption(road){
  return road.name+' ('+road.short+')\n\n'+(road.facts||[]).join('\n\n')+'\n\n📍 Singapore\n\n'+(road.hashtags||'#Singapore');
}

function copyCaption(){
  if(!activeRoad) return;
  navigator.clipboard.writeText(buildCaption(activeRoad)).then(function(){
    var btn=document.getElementById('btn-copy');
    var ob=btn.style.background,obd=btn.style.borderColor,ot=btn.textContent;
    btn.classList.add('copied'); btn.textContent='✓ Copied!'; btn.style.background=''; btn.style.borderColor='';
    setTimeout(function(){ btn.classList.remove('copied'); btn.textContent=ot; btn.style.background=ob; btn.style.borderColor=obd; },2400);
    setStatus('ok','Caption copied.');
  }).catch(function(){ setStatus('error','Clipboard denied.'); });
}

function exportMap(){
  setStatus('loading','Exporting…');
  try{
    leafletImage(map,function(err,canvas){
      if(err){setStatus('error','Export failed.');return;}
      var a=document.createElement('a');
      a.download=(activeRoad?activeRoad.short:'sg')+'_roads.png';
      a.href=canvas.toDataURL('image/png'); a.click();
      setStatus('ok','Exported '+a.download);
    });
  }catch(e){setStatus('error','Screenshot manually.');}
}

function setStatus(s,m){ document.getElementById('status-dot').className=s||''; document.getElementById('status-text').textContent=m; }
function toggleSidebar(){ document.getElementById('sidebar').classList.contains('open')?closeSidebar():openSidebar(); }
function openSidebar(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('hamburger').classList.add('open'); document.getElementById('overlay').classList.add('active'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('hamburger').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); }
</script>
</body>
</html>
